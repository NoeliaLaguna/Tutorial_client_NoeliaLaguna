<h1 mat-dialog-title>
  {{ loan.id ? 'Modificar préstamo' : 'Crear préstamo' }}
</h1>

<mat-dialog-content class="dialog-content">

  <form class="form">

    <mat-form-field appearance="outline">
      <mat-label>Identificador</mat-label>
      <input
        matInput
        [(ngModel)]="loan.id"
        name="id"
        disabled
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Cliente</mat-label>
      <mat-select
        [(ngModel)]="loan.client"
        name="client"
        required
      >
        @for (client of clients; track client.id) {
          <mat-option [value]="client">
            {{ client.name }}
          </mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Juego</mat-label>
      <mat-select
        [(ngModel)]="loan.game"
        name="game"
        required
      >
        @for (game of games; track game.id) {
          <mat-option [value]="game">
            {{ game.title }}
          </mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Fecha de inicio</mat-label>
      <input
        matInput
        [matDatepicker]="startPicker"
        [(ngModel)]="loan.startDate"
        name="startDate"
        required
      />
      <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
      <mat-datepicker #startPicker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Fecha de fin</mat-label>
      <input
        matInput
        [matDatepicker]="endPicker"
        [(ngModel)]="loan.endDate"
        name="endDate"
        required
      />
      <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
      <mat-datepicker #endPicker></mat-datepicker>
    </mat-form-field>

  </form>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="onClose()">Cerrar</button>
  <button mat-flat-button color="primary" (click)="onSave()">Guardar</button>
</mat-dialog-actions>
