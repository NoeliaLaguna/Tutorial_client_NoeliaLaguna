<div class="container">
    @if (loan.id) {
        <h1>Modificar prestamo</h1>
    } @else {
        <h1>Crear prestamo</h1>
    }

    <form>
      <mat-form-field>
        <mat-label>Identificador</mat-label>
        <input matInput [(ngModel)]="loan.id" name="id" disabled />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Cliente</mat-label>
        <mat-select [(ngModel)]="loan.client.id" name="clientId" required>
          <mat-option [value]="null">Seleccione cliente</mat-option>

          @for (client of clients; track client.id) {
          <mat-option [value]="client.id">
            {{ client.name }}
          </mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Juego</mat-label>
        <mat-select [(ngModel)]="loan.game.id" name="gameId" required>
          <mat-option [value]="null">Seleccione juego</mat-option>

          @for (game of games; track game.id) {
          <mat-option [value]="game.id">
            {{ game.title }}
          </mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Fecha de inicio</mat-label>
        <input matInput [matDatepicker]="startPicker" [(ngModel)]="loan.startDate" name="startDate" required />
        <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Fecha de fin</mat-label>
        <input matInput [matDatepicker]="endPicker" [(ngModel)]="loan.endDate" name="endDate" required />
        <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    </form>


    <div class="buttons">
        <button mat-stroked-button (click)="onClose()">Cerrar</button>
        <button mat-flat-button color="primary" (click)="onSave()">Guardar</button>
    </div>

</div>
